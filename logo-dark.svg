<?xml version="1.0" encoding="UTF-8"?>
<!-- Light wordmark variant for dark backgrounds (footer, etc.) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 72" role="img" aria-label="Helm">
  <defs>
    <linearGradient id="helmGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <g transform="translate(8, 8)">
    <circle cx="28" cy="28" r="25" fill="none" stroke="url(#helmGrad2)" stroke-width="3"/>
    <circle cx="28" cy="28" r="5" fill="url(#helmGrad2)"/>
    <g stroke="url(#helmGrad2)" stroke-width="3" stroke-linecap="round">
      <line x1="28" y1="3"  x2="28" y2="13"/>
      <line x1="28" y1="43" x2="28" y2="53"/>
      <line x1="3"  y1="28" x2="13" y2="28"/>
      <line x1="43" y1="28" x2="53" y2="28"/>
      <line x1="10.4" y1="10.4" x2="17.5" y2="17.5"/>
      <line x1="45.6" y1="10.4" x2="38.5" y2="17.5"/>
      <line x1="10.4" y1="45.6" x2="17.5" y2="38.5"/>
      <line x1="45.6" y1="45.6" x2="38.5" y2="38.5"/>
    </g>
  </g>

  <g transform="translate(80, 0)"
     font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif"
